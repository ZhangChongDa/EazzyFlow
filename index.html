<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TeleFlow AI - Next Gen MCCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://aistudiocdn.com/@xyflow/react@^12.9.3/dist/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
  @tailwind base;
  @tailwind components;
  @tailwind utilities;
      @layer base {
        body {
          @apply font-sans bg-slate-50 text-slate-900;
        }
      }

      /* Global Styles moved from index.css for CDN processing */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
      }

      /* React Flow Customizations */
      .react-flow__node {
        font-family: 'Inter', sans-serif;
      }
      .react-flow__controls {
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }
      .react-flow__controls-button {
        background: white;
        border-bottom: 1px solid #e2e8f0;
      }
      .react-flow__controls-button:hover {
        background: #f8fafc;
      }
    </style>
    <script>
      // Polyfill process for browser compatibility
      window.process = { env: {} };
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@xyflow/react/": "https://aistudiocdn.com/@xyflow/react@^12.9.3/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "@xyflow/react": "https://aistudiocdn.com/@xyflow/react@^12.9.3",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
